{% if site.data.sidebar %}
  {% assign category_sidebar = site.data.sidebar[page.category] %}
  {% if category_sidebar %}
    <aside class="page-sidebar" aria-label="Page navigation">
      <nav class="sidebar-nav">
        <ul class="sidebar-list">
          {% for item in category_sidebar %}
            {% assign item_url = item.url | relative_url %}
            <li>
              <a href="{{ item_url }}" class="sidebar-link{% if page.url == item_url %} active{% endif %}">
                {{ item.title | escape }}
              </a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </aside>
  {% endif %}
{% endif %}
