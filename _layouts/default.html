<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-default-theme="{{ site.appearance.default | default: 'dark' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}
  </title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description | escape }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
  <script>window.SEARCH_INDEX_PATH = "{{ '/search.json' | relative_url }}";</script>
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to content</a>
  {% include nav.html %}
  <main class="main-content" id="main-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <div class="reading-progress" id="reading-progress" aria-hidden="true"></div>
  <button class="back-to-top" id="back-to-top" aria-label="Back to top" title="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>
  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  {% if site.search.enabled %}
    <script src="{{ '/assets/js/search.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  {% endif %}
</body>
</html>
