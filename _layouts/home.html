---
layout: default
---

<div class="home-hero">
  <div class="container">
    <h1 class="hero-title">{{ site.title | escape }}</h1>
    <p class="hero-subtitle">{{ site.description | escape }}</p>
    <div class="hero-actions">
      <a href="{{ '/wiki/' | relative_url }}" class="btn btn-primary">Browse Wiki</a>
      <a href="{{ '/wiki/using-this-wiki/' | relative_url }}" class="btn btn-secondary">Using This Wiki</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="home-content">
    {{ content }}
  </div>
</div>
